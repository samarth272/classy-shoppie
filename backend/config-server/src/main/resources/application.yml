spring:
  application:
    name: config-server

  cloud:
    config:
      server:
        native:
          search-locations:
            file:../config-repo

  profiles:
    active: native

server:
  port: 8888

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

logging:
  level:
    org.springframework.cloud.config: DEBUG